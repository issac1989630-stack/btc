<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>比特幣週期監控系統 (Standalone)</title>
    
    <!-- 1. 核心樣式庫 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 3. React 核心 (UMD 版本) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 4. Babel (讓瀏覽器看不懂的 JSX 變成看得懂的 JS) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 5. EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a; /* Slate 900 */
        color: #f8fafc;
      }
      /* Custom Range Slider Styling */
      input[type=range] {
        -webkit-appearance: none; 
        background: transparent; 
      }
      
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: #f7931a; /* Bitcoin Orange */
        cursor: pointer;
        margin-top: -8px; 
        box-shadow: 0 0 10px rgba(247, 147, 26, 0.5);
      }
      
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: #334155;
        border-radius: 2px;
      }

      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.5.1",
    "@emailjs/browser": "https://esm.sh/@emailjs/browser@^4.4.1",
    "vite": "https://esm.sh/vite@^7.2.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
    <div id="root">
        <!-- 載入中畫面 -->
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8;">
            <svg class="animate-spin h-10 w-10 text-orange-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>正在初始化應用程式...</p>
        </div>
    </div>

    <!-- 主程式邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- 1. 元件: InputSlider ---
        const InputSlider = ({ label, value, onChange, min, max, step, unit, weight, description, detailedInfo, inverse = false }) => {
            return (
                <div className="mb-6 p-4 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-slate-600 transition-colors">
                    <div className="flex justify-between items-center mb-2">
                        <div>
                            <h3 className="text-sm font-semibold text-slate-200">{label}</h3>
                            <p className="text-xs text-slate-400">{description}</p>
                        </div>
                        <div className="text-right">
                            <span className="block text-lg font-bold text-orange-400 font-mono">
                            {value}{unit}
                            </span>
                            <span className="text-xs text-slate-500 font-mono">權重: {weight}%</span>
                        </div>
                    </div>
                    
                    <input
                        type="range"
                        min={min}
                        max={max}
                        step={step}
                        value={value}
                        onChange={(e) => onChange(parseFloat(e.target.value))}
                        className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer mb-2"
                    />
                    
                    <div className="flex justify-between text-xs text-slate-500 mb-3">
                        {inverse ? (
                            <React.Fragment>
                                <span className="text-red-400">{min}{unit} (賣出/貪婪)</span>
                                <span className="text-green-400">{max}{unit} (買入/恐懼)</span>
                            </React.Fragment>
                        ) : (
                            <React.Fragment>
                                <span className="text-green-400">{min}{unit} (買入)</span>
                                <span className="text-red-400">{max}{unit} (賣出)</span>
                            </React.Fragment>
                        )}
                    </div>

                    {detailedInfo && (
                        <div className="mt-2 pt-3 border-t border-slate-700/50">
                        <div className="bg-slate-900/60 rounded p-3 text-xs leading-relaxed text-slate-400 border-l-2 border-slate-600">
                            <span className="font-bold text-orange-500/80 mr-1">指標解讀:</span>
                            {detailedInfo}
                        </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 2. 元件: ScoreGauge ---
        const ScoreGauge = ({ score, adviceTitle, adviceColor }) => {
            const radius = 120;
            const normalizedScore = Math.min(Math.max(score, 0), 100);
            const r = 80;
            const c = Math.PI * r; 
            const pct = ((100 - normalizedScore) / 100) * c;

            const getColor = (s) => {
                if (s < 20) return '#22c55e'; // Green
                if (s < 40) return '#84cc16'; // Lime
                if (s < 65) return '#eab308'; // Yellow
                if (s < 80) return '#f97316'; // Orange
                return '#ef4444'; // Red
            };
            
            const gaugeColor = getColor(normalizedScore);

            return (
                <div className="flex flex-col items-center justify-center p-6 relative">
                    <svg width="240" height="140" viewBox="0 0 200 110" className="overflow-visible">
                        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#334155" strokeWidth="12" strokeLinecap="round" />
                        <path
                            d="M 20 100 A 80 80 0 0 1 180 100"
                            fill="none"
                            stroke={gaugeColor}
                            strokeWidth="12"
                            strokeLinecap="round"
                            strokeDasharray={c}
                            strokeDashoffset={pct}
                            className="transition-all duration-700 ease-out"
                        />
                        <text x="100" y="85" textAnchor="middle" fill="white" className="text-4xl font-bold font-mono">
                            {score.toFixed(1)}
                        </text>
                        <text x="100" y="105" textAnchor="middle" fill="#94a3b8" className="text-xs uppercase tracking-widest">
                            週期分數
                        </text>
                    </svg>
                    
                    <div className={`mt-4 text-center px-4 py-2 rounded-full border ${adviceColor} bg-opacity-10 bg-slate-800`}>
                        <h2 className="text-xl font-bold transition-colors duration-300" style={{ color: gaugeColor }}>
                            {adviceTitle}
                        </h2>
                    </div>
                </div>
            );
        };

        // --- 3. 元件: BreakdownChart (Custom HTML/CSS Implementation for Stability) ---
        const BreakdownChart = ({ data }) => {
            return (
                <div className="w-full mt-4">
                    <h3 className="text-slate-400 text-sm font-semibold mb-4 uppercase tracking-wider">分數貢獻細項</h3>
                    <div className="space-y-3">
                        {data.map((item, idx) => {
                            // Max possible weighted score differs per item, but let's normalize bar visualization
                            // Max possible weight is roughly 30 (MVRV), so we use 30 as visual max
                            const widthPct = Math.min((item.weightedScore / 30) * 100, 100);
                            
                            let colorClass = "bg-orange-500";
                            if (item.rawScore < 20) colorClass = "bg-green-500";
                            else if (item.rawScore > 80) colorClass = "bg-red-500";
                            else if (item.rawScore < 40) colorClass = "bg-lime-500";
                            
                            return (
                                <div key={idx} className="group">
                                    <div className="flex justify-between text-xs mb-1">
                                        <span className="text-slate-300">{item.name}</span>
                                        <span className="font-mono text-slate-400">+{item.weightedScore.toFixed(1)}</span>
                                    </div>
                                    <div className="h-2 w-full bg-slate-800 rounded-full overflow-hidden relative">
                                        <div 
                                            className={`h-full rounded-full ${colorClass} transition-all duration-1000`} 
                                            style={{ width: `${widthPct}%` }}
                                        ></div>
                                    </div>
                                    <div className="text-[10px] text-slate-500 mt-0.5 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                        原始分數: {item.rawScore.toFixed(0)}/100
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        // --- 4. 元件: SubscribeModal ---
        const SubscribeModal = ({ isOpen, onClose, currentLink, currentResults, currentPrice, currentDate, inputs }) => {
            const [email, setEmail] = useState('');
            const [isSubscribed, setIsSubscribed] = useState(false);
            const [isLoading, setIsLoading] = useState(false);

            const SERVICE_ID = 'service_hsnlldd';
            const TEMPLATE_ID = 'template_67w5f0a';
            const PUBLIC_KEY = 'C8dqNYkVgpGpWX15R';

            useEffect(() => {
                const saved = localStorage.getItem('btc_monitor_subscription');
                if (saved === 'true') {
                    setIsSubscribed(true);
                    const savedEmail = localStorage.getItem('btc_monitor_email');
                    if (savedEmail) setEmail(savedEmail);
                }
                // Init EmailJS
                if (window.emailjs) window.emailjs.init(PUBLIC_KEY);
            }, []);

            const generateEmailBody = () => {
                const priceStr = currentPrice 
                    ? `$${currentPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}` 
                    : '資料讀取中';

                return `
【📅 ${currentDate} 市場快報】
💰 BTC 現價: ${priceStr}
📊 週期總分: ${currentResults.totalScore.toFixed(1)} / 100
🌊 市場狀態: ${currentResults.advice.title}
💡 操作建議: ${currentResults.advice.description}

--------------------------------
[詳細指標數據]
• MVRV Z-Score: ${inputs.mvrv} (貢獻: ${currentResults.breakdown.find(b => b.id === 'mvrv')?.weightedScore.toFixed(1)})
• AHR999 Index: ${inputs.ahr999} (貢獻: ${currentResults.breakdown.find(b => b.id === 'ahr999')?.weightedScore.toFixed(1)})
• 2年 MA 倍數: ${inputs.maMultiplier}% (貢獻: ${currentResults.breakdown.find(b => b.id === 'maMultiplier')?.weightedScore.toFixed(1)})
• USDT 市占率: ${inputs.usdtDom}% (貢獻: ${currentResults.breakdown.find(b => b.id === 'usdtDom')?.weightedScore.toFixed(1)})
• 資金費率: ${inputs.funding}% (貢獻: ${currentResults.breakdown.find(b => b.id === 'funding')?.weightedScore.toFixed(1)})
• 週線 RSI: ${inputs.rsi} (貢獻: ${currentResults.breakdown.find(b => b.id === 'rsi')?.weightedScore.toFixed(1)})
                `.trim();
            };

            const handleSubscribe = async (e) => {
                e.preventDefault();
                setIsLoading(true);

                try {
                    const messageBody = generateEmailBody();
                    await window.emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                        to_email: email,          
                        email: email,             
                        reply_to: email,          
                        message: messageBody,     
                        report_link: currentLink,
                        subscription_date: new Date().toLocaleDateString()
                    });

                    localStorage.setItem('btc_monitor_subscription', 'true');
                    localStorage.setItem('btc_monitor_email', email);
                    setIsSubscribed(true);
                    alert(`設定成功！\n\n1. 確認信已發送至 ${email}。\n2. 此設定僅儲存於本機瀏覽器。`);
                } catch (error) {
                    console.error('Email failed:', error);
                    alert('發送失敗，請檢查 EmailJS 設定。');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleUnsubscribe = () => {
                setIsLoading(true);
                setTimeout(() => {
                    localStorage.removeItem('btc_monitor_subscription');
                    localStorage.removeItem('btc_monitor_email');
                    setIsSubscribed(false);
                    setEmail('');
                    setIsLoading(false);
                }, 1000);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative bg-slate-900 border border-slate-700 rounded-2xl p-6 md:p-8 max-w-md w-full shadow-2xl">
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>

                        <div className="text-center mb-6">
                            <h2 className="text-2xl font-bold text-white">日報訂閱設定</h2>
                            <p className="text-slate-400 text-sm mt-2">設定 Email 以接收市場快報測試。</p>
                        </div>

                        {isSubscribed ? (
                            <div className="text-center space-y-4">
                                <div className="bg-green-500/10 border border-green-500/30 rounded-xl p-4">
                                    <p className="text-green-400 font-bold">已訂閱</p>
                                    <p className="text-orange-300 font-mono mt-1">{email}</p>
                                </div>
                                <button onClick={handleUnsubscribe} disabled={isLoading} className="text-slate-500 hover:text-red-400 text-sm underline">
                                    {isLoading ? '處理中...' : '移除設定'}
                                </button>
                            </div>
                        ) : (
                            <form onSubmit={handleSubscribe} className="space-y-4">
                                <input
                                    type="email"
                                    required
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none"
                                    placeholder="name@example.com"
                                />
                                <button
                                    type="submit"
                                    disabled={isLoading}
                                    className="w-full py-3 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-600 disabled:bg-slate-600"
                                >
                                    {isLoading ? '發送中...' : '發送測試信'}
                                </button>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // --- 5. Main App Logic ---
        const App = () => {
            const [currentDate, setCurrentDate] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [btcPrice, setBtcPrice] = useState(null);
            const [priceTrend, setPriceTrend] = useState('neutral');
            const [dataSourceInfo, setDataSourceInfo] = useState("尚未同步");
            const [isSubscribeModalOpen, setIsSubscribeModalOpen] = useState(false);
            const [autoSendStatus, setAutoSendStatus] = useState("等待排程檢查...");
            
            const priceHistoryRef = useRef([]);

            // Default State
            const [inputs, setInputs] = useState({
                mvrv: 1.5,
                ahr999: 1.2,
                maMultiplier: 40,
                usdtDom: 5.0,
                funding: 0.01,
                rsi: 50
            });

            // EmailJS Config
            const EMAIL_SERVICE_ID = 'service_hsnlldd';
            const EMAIL_TEMPLATE_ID = 'template_67w5f0a';
            const EMAIL_PUBLIC_KEY = 'C8dqNYkVgpGpWX15R';

            // Helpers
            const calculateSMA = (data, window) => {
                if (data.length < window) return null;
                const slice = data.slice(data.length - window);
                return slice.reduce((a, b) => a + b, 0) / window;
            };

            const calculateGeoMean = (data, window) => {
                if (data.length < window) return null;
                const slice = data.slice(data.length - window);
                const sumLog = slice.reduce((acc, val) => acc + Math.log(val), 0);
                return Math.exp(sumLog / window);
            };

            const calculateRSI = (prices, period = 14) => {
                if (prices.length < period + 1) return 50;
                let gains = 0, losses = 0;
                for (let i = 1; i <= period; i++) {
                    const change = prices[i] - prices[i - 1];
                    if (change > 0) gains += change; else losses += Math.abs(change);
                }
                let avgGain = gains / period;
                let avgLoss = losses / period;
                for (let i = period + 1; i < prices.length; i++) {
                    const change = prices[i] - prices[i - 1];
                    if (change > 0) {
                        avgGain = (avgGain * (period - 1) + change) / period;
                        avgLoss = (avgLoss * (period - 1)) / period;
                    } else {
                        avgGain = (avgGain * (period - 1)) / period;
                        avgLoss = (avgLoss * (period - 1) + Math.abs(change)) / period;
                    }
                }
                if (avgLoss === 0) return 100;
                return 100 - (100 / (1 + (avgGain / avgLoss)));
            };

            const mapRange = (value, inMin, inMax, outMin, outMax) => {
                return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
            };

            // Fetchers
            const fetchFundingRate = async () => {
                try {
                    const res = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT');
                    if (!res.ok) throw new Error("Blocked");
                    const data = await res.json();
                    return { value: parseFloat(data.lastFundingRate) * 100, source: 'Binance' };
                } catch (e) {
                    try {
                        const res = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                        const data = await res.json();
                        return { value: parseFloat(data.result.list[0].fundingRate) * 100, source: 'Bybit' };
                    } catch (err) {
                        return { value: 0.01, source: 'Default' };
                    }
                }
            };

            const fetchMVRVZScore = async (prices) => {
                try {
                    const res = await fetch('https://api.blockchain.info/charts/mvrv-z-score?timespan=5weeks&rollingAverage=8hours&format=json', { headers: { 'Accept': 'application/json' }});
                    if (!res.ok) throw new Error("Blocked");
                    const data = await res.json();
                    return { value: data.values[data.values.length - 1].y, source: 'Blockchain.info' };
                } catch (e) {
                    const currentPrice = prices[prices.length - 1];
                    const ma200Week = calculateSMA(prices, 1400); 
                    let proxy = 1.5;
                    if (ma200Week) {
                        const ratio = currentPrice / ma200Week;
                        proxy = ((ratio - 0.8) / 3.2) * 8 - 1;
                    }
                    return { value: proxy, source: 'Calc(Price/200WMA)' };
                }
            };

            const fetchUSDTDom = async () => {
                try {
                    const res = await fetch('https://api.coingecko.com/api/v3/global');
                    if (!res.ok) throw new Error("Failed");
                    const data = await res.json();
                    return { value: data.data.market_cap_percentage.usdt, source: 'CoinGecko' };
                } catch (e) {
                    return { value: 5.0, source: 'Default' };
                }
            };

            const updateLivePriceOnly = async () => {
                try {
                    const response = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                    if (!response.ok) return;
                    const json = await response.json();
                    const newPrice = parseFloat(json.data.amount);
                    setBtcPrice(newPrice);
                    
                    // Trend logic
                    const now = Date.now();
                    const history = priceHistoryRef.current;
                    history.push({ price: newPrice, timestamp: now });
                    const oneMinuteAgo = now - 60000;
                    while(history.length > 0 && history[0].timestamp < oneMinuteAgo) history.shift();
                    
                    if (history.length > 0) {
                        const startPrice = history[0].price;
                        if (newPrice > startPrice) setPriceTrend('up');
                        else if (newPrice < startPrice) setPriceTrend('down');
                        else setPriceTrend('neutral');
                    }
                } catch (e) {}
            };

            const fetchFallbackData = async () => {
                try {
                    const fngResponse = await fetch('https://api.alternative.me/fng/');
                    let fngValue = 50; 
                    if (fngResponse.ok) {
                        const fngJson = await fngResponse.json();
                        fngValue = parseInt(fngJson.data[0].value, 10);
                    }
                    setInputs({
                        mvrv: Number(mapRange(fngValue, 0, 100, -0.8, 4.5).toFixed(2)),
                        ahr999: Number(mapRange(fngValue, 0, 100, 0.5, 6.0).toFixed(2)),
                        maMultiplier: Math.floor(mapRange(fngValue, 0, 100, 10, 95)),
                        usdtDom: Number(mapRange(fngValue, 0, 100, 7.5, 2.5).toFixed(2)),
                        funding: Number(mapRange(fngValue, 0, 100, -0.005, 0.06).toFixed(4)),
                        rsi: Math.floor(mapRange(fngValue, 0, 100, 32, 85))
                    });
                    setDataSourceInfo(`API 受限 - 智能估算模式 (F&G: ${fngValue})`);
                    await updateLivePriceOnly();
                } catch (e) {
                    setDataSourceInfo("數據完全無法同步");
                }
            };

            const fetchDataOrchestrator = useCallback(async () => {
                setIsLoading(true);
                setDataSourceInfo("正在獲取數據...");
                try {
                    const historyRes = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=max&interval=daily');
                    if (!historyRes.ok) throw new Error("API Failed");
                    const historyData = await historyRes.json();
                    const prices = historyData.prices.map(p => p[1]);
                    
                    const currentPrice = prices[prices.length - 1];
                    setBtcPrice(currentPrice);

                    const [fundingRes, mvrvRes, usdtRes] = await Promise.all([
                        fetchFundingRate(),
                        fetchMVRVZScore(prices),
                        fetchUSDTDom()
                    ]);

                    // Calculations
                    const geoMean200 = calculateGeoMean(prices, 200) || currentPrice;
                    const launchDate = new Date('2009-01-03').getTime();
                    const daysSinceLaunch = (Date.now() - launchDate) / (86400000);
                    const expValuation = Math.pow(10, (5.84 * Math.log10(daysSinceLaunch)) - 17.01);
                    const ahr999Value = (currentPrice / geoMean200) * (currentPrice / expValuation);

                    const ma2Year = calculateSMA(prices, 730);
                    let maMultiplierPos = 50; 
                    if (ma2Year) {
                        const ma2YearX5 = ma2Year * 5;
                        const pos = ((currentPrice - ma2Year) / (ma2YearX5 - ma2Year)) * 100;
                        maMultiplierPos = Math.max(0, Math.min(100, pos));
                    }

                    const weeklyPrices = [];
                    for(let i = prices.length - 1; i >= 0; i -= 7) weeklyPrices.unshift(prices[i]);
                    const rsiValue = calculateRSI(weeklyPrices, 14);

                    setInputs({
                        mvrv: Number(mvrvRes.value.toFixed(2)),
                        ahr999: Number(ahr999Value.toFixed(2)),
                        maMultiplier: Number(maMultiplierPos.toFixed(0)),
                        usdtDom: Number(usdtRes.value.toFixed(2)),
                        funding: Number(fundingRes.value.toFixed(4)),
                        rsi: Number(rsiValue.toFixed(0))
                    });

                    setDataSourceInfo(`已同步 (${mvrvRes.source}, ${fundingRes.source})`);
                } catch (error) {
                    console.warn("Fallback triggered");
                    await fetchFallbackData();
                } finally {
                    setIsLoading(false);
                    const now = new Date();
                    setCurrentDate(now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }) + " " + now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }));
                }
            }, []);

            // Calculation Engine
            const results = useMemo(() => {
                const breakdown = [];
                let totalScore = 0;

                const mvrvNorm = Math.min(Math.max((inputs.mvrv - (-1)) / (7 - (-1)) * 100, 0), 100);
                const mvrvWeighted = mvrvNorm * 0.30;
                breakdown.push({ id: 'mvrv', name: 'MVRV Z-Score', rawScore: mvrvNorm, weightedScore: mvrvWeighted });
                totalScore += mvrvWeighted;

                const ahrNorm = Math.min(Math.max((inputs.ahr999 - 0.45) / (10 - 0.45) * 100, 0), 100);
                const ahrWeighted = ahrNorm * 0.20;
                breakdown.push({ id: 'ahr999', name: 'AHR999', rawScore: ahrNorm, weightedScore: ahrWeighted });
                totalScore += ahrWeighted;

                const maNorm = Math.min(Math.max(inputs.maMultiplier, 0), 100);
                const maWeighted = maNorm * 0.20;
                breakdown.push({ id: 'maMultiplier', name: '2年 MA 倍數', rawScore: maNorm, weightedScore: maWeighted });
                totalScore += maWeighted;

                const usdtNorm = Math.min(Math.max((8 - inputs.usdtDom) / (8 - 2) * 100, 0), 100);
                const usdtWeighted = usdtNorm * 0.15;
                breakdown.push({ id: 'usdtDom', name: 'USDT 市占率', rawScore: usdtNorm, weightedScore: usdtWeighted });
                totalScore += usdtWeighted;

                const fundingAdjusted = Math.max(inputs.funding, 0); 
                const fundingNorm = Math.min(Math.max((fundingAdjusted / 0.1) * 100, 0), 100);
                const fundingWeighted = fundingNorm * 0.10;
                breakdown.push({ id: 'funding', name: '資金費率', rawScore: fundingNorm, weightedScore: fundingWeighted });
                totalScore += fundingWeighted;

                const rsiNorm = Math.min(Math.max((inputs.rsi - 30) / (90 - 30) * 100, 0), 100);
                const rsiWeighted = rsiNorm * 0.05;
                breakdown.push({ id: 'rsi', name: '週線 RSI', rawScore: rsiNorm, weightedScore: rsiWeighted });
                totalScore += rsiWeighted;

                let advice = { title: "", color: "", description: "" };
                if (totalScore < 20) advice = { title: "強力買入 (深度價值)", color: "text-green-500 border-green-500", description: "全倉買入 (ALL IN)。歷史底部區域。" };
                else if (totalScore < 40) advice = { title: "累積籌碼 (定投)", color: "text-lime-400 border-lime-400", description: "適合定期定額投資 (DCA) 的區域。" };
                else if (totalScore < 65) advice = { title: "觀望 (HODL)", color: "text-yellow-400 border-yellow-400", description: "中性區域。按兵不動。" };
                else if (totalScore < 80) advice = { title: "停止買入", color: "text-orange-500 border-orange-500", description: "市場過熱。" };
                else advice = { title: "賣出 (泡沫)", color: "text-red-500 border-red-500", description: "獲利了結。歷史頂部區域。" };

                return { totalScore, breakdown, advice };
            }, [inputs]);

            // Effects
            useEffect(() => {
                fetchDataOrchestrator();
                const interval = setInterval(updateLivePriceOnly, 10000);
                return () => clearInterval(interval);
            }, [fetchDataOrchestrator]);

            const handleManualSend = async () => {
                const email = localStorage.getItem('btc_monitor_email');
                if (!email) {
                    alert("請先訂閱，設定 Email 後再進行測試。");
                    return;
                }
                if(!window.confirm(`確定要立刻發送一封測試信件給 ${email} 嗎？`)) return;
                
                // Trigger logic handled inside modal usually, but for quick button:
                try {
                    // Quick construct
                    const body = `【手動測試】\n現價: ${btcPrice}\n分數: ${results.totalScore.toFixed(1)}`;
                    await window.emailjs.send(EMAIL_SERVICE_ID, EMAIL_TEMPLATE_ID, {
                        to_email: email, email, reply_to: email, message: body, report_link: window.location.href, subscription_date: 'Test'
                    });
                    alert("發送成功");
                } catch(e) {
                    alert("發送失敗");
                }
            };

            const getTrendStyles = () => {
                if (priceTrend === 'up') return { bg: 'bg-green-500/10', border: 'border-green-500/50', text: 'text-green-400' };
                if (priceTrend === 'down') return { bg: 'bg-red-500/10', border: 'border-red-500/50', text: 'text-red-400' };
                return { bg: 'bg-slate-800/80', border: 'border-slate-600', text: 'text-white' };
            };
            const trendStyles = getTrendStyles();

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    <header className="mb-8 flex flex-col md:flex-row justify-between items-end border-b border-slate-700 pb-4 gap-4">
                        <div className="text-center md:text-left w-full md:w-auto">
                            <h1 className="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-300">
                                比特幣週期監控系統
                            </h1>
                            <div className="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 mt-3">
                                <p className="text-slate-400 text-sm">量化分析系統 v2.7 (Single File)</p>
                                {btcPrice && (
                                    <div className={`flex w-fit mx-auto md:mx-0 items-center justify-center md:justify-start gap-2 px-4 py-1.5 rounded-lg border shadow-lg transition-all ${trendStyles.bg} ${trendStyles.border}`}>
                                        <div className="flex items-baseline gap-1">
                                            <span className={`text-xl font-mono font-bold tracking-wide ${trendStyles.text}`}>
                                                ${btcPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                            </span>
                                            <span className="text-xs text-slate-400 font-semibold">USD</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-3 justify-end">
                            <button onClick={handleManualSend} className="px-3 py-3 rounded-xl font-bold bg-slate-800 text-slate-400 hover:text-white border border-slate-700 text-xs">
                                強制發送測試
                            </button>
                            <button onClick={() => setIsSubscribeModalOpen(true)} className="px-4 py-3 rounded-xl font-bold bg-slate-800 text-slate-300 border border-slate-600 hover:text-white hover:bg-slate-700">
                                訂閱日報
                            </button>
                            <button onClick={fetchDataOrchestrator} disabled={isLoading} className={`px-6 py-3 rounded-xl font-bold text-white transition-all ${isLoading ? 'bg-slate-700 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600 shadow-lg shadow-orange-500/20'}`}>
                                {isLoading ? '計算中...' : '同步即時數據'}
                            </button>
                        </div>
                    </header>

                    <SubscribeModal 
                        isOpen={isSubscribeModalOpen} 
                        onClose={() => setIsSubscribeModalOpen(false)} 
                        currentLink={window.location.href}
                        currentResults={results}
                        currentPrice={btcPrice}
                        currentDate={currentDate}
                        inputs={inputs}
                    />

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-7 space-y-4">
                            <div className="glass-panel p-6 rounded-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-semibold text-white flex items-center gap-2">
                                        <span className="w-2 h-6 bg-orange-500 rounded-full"></span>
                                        市場指標數據
                                    </h2>
                                    <span className="text-xs text-slate-400 border border-slate-700 px-2 py-1 rounded-md">來源: {dataSourceInfo}</span>
                                </div>
                                <InputSlider label="MVRV Z-Score" description="優先使用鏈上數據，若受限則使用 200WMA 代理。" value={inputs.mvrv} min={-1} max={7} step={0.1} unit="" weight={30} onChange={(v) => setInputs(p => ({...p, mvrv: v}))} />
                                <InputSlider label="AHR999 Index" description="基於價格、200天幾何平均與幣齡指數運算。" value={inputs.ahr999} min={0.45} max={10} step={0.05} unit="" weight={20} onChange={(v) => setInputs(p => ({...p, ahr999: v}))} />
                                <InputSlider label="2-Year MA Multiplier" description="0% = MA2; 100% = MA2 x 5。" value={inputs.maMultiplier} min={0} max={100} step={1} unit="%" weight={20} onChange={(v) => setInputs(p => ({...p, maMultiplier: v}))} />
                                <InputSlider label="USDT Dominance" description="USDT 市占率 (反向指標)。" value={inputs.usdtDom} min={2} max={8} step={0.1} unit="%" weight={15} onChange={(v) => setInputs(p => ({...p, usdtDom: v}))} inverse={true} />
                                <InputSlider label="Funding Rate" description="永續合約資金費率。" value={inputs.funding} min={-0.02} max={0.12} step={0.001} unit="%" weight={10} onChange={(v) => setInputs(p => ({...p, funding: v}))} />
                                <InputSlider label="Weekly RSI" description="14 週 RSI。" value={inputs.rsi} min={30} max={90} step={1} unit="" weight={5} onChange={(v) => setInputs(p => ({...p, rsi: v}))} />
                            </div>
                        </div>
                        <div className="lg:col-span-5 space-y-6">
                            <div className="glass-panel p-8 rounded-2xl text-center shadow-2xl shadow-orange-500/10 relative overflow-hidden">
                                <div className="inline-block px-4 py-1 bg-slate-800 rounded-full border border-slate-600 mb-4">
                                    <span className="text-slate-400 text-xs font-mono mr-2">📅 數據日期:</span>
                                    <span className="text-orange-300 font-bold font-mono">{currentDate}</span>
                                </div>
                                <h2 className="text-slate-400 text-sm font-semibold uppercase tracking-widest mt-2 mb-4">當前市場週期狀態</h2>
                                <ScoreGauge score={results.totalScore} adviceTitle={results.advice.title} adviceColor={results.advice.color} />
                                <p className="mt-4 text-slate-300 italic">"{results.advice.description}"</p>
                            </div>
                            <div className="glass-panel p-6 rounded-2xl">
                                <BreakdownChart data={results.breakdown} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
